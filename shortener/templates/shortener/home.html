<h1>URL Shortener</h1>

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Shorten</button>
</form>

{% if new_url %}
<p>Your short link is: <a href="{{ new_url }}">{{ new_url }} ></a></p>
<p>
    Clicks: {{ obj.clicks }}
</p>
<form method="POST">
    {% csrf_token %}
    
    {% if form.errors %}
        <div style="color: red;">
            {{ form.original_url.errors }}
        </div>
    {% endif %}

    {{ form.as_p }}
    <button type="submit">Shorten</button>
</form>
{% endif %}
